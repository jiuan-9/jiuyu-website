<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/icon.ico?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="description" content="Quiddity — 多模型 AI 桌面应用，你的专属 AI 伙伴。支持 DeepSeek、通义千问、Kimi 等 11 家 AI 服务商。" />
    <meta name="keywords" content="Quiddity,AI聊天,AI助手,桌面AI,DeepSeek,通义千问,Kimi,多模型AI" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="color-scheme" content="dark" />
    <meta name="darkreader-lock" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="renderer" content="webkit" />
    <meta name="force-rendering" content="webkit" />
    <meta name="applicable-device" content="pc,mobile" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <meta name="format-detection" content="telephone=no,email=no,address=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quiddity" />
    <link rel="dns-prefetch" href="//api.deepseek.com" />
    <link rel="dns-prefetch" href="//dashscope.aliyuncs.com" />
    <link rel="dns-prefetch" href="//api.siliconflow.cn" />
    <title>Quiddity — 你的专属 AI 伙伴</title>
    <script>
      if (history.scrollRestoration) history.scrollRestoration = 'manual';
      window.scrollTo(0, 0);
      document.addEventListener('DOMContentLoaded', function () {
        window.scrollTo(0, 0);
      });

      /*
       * 浏览器强制暗黑模式适配（v2 修正版）
       *
       * 旧版 bug：在 <head> 中执行时 document.body 尚未创建，
       * appendChild 抛错被 try/catch 静默吞掉，
       * 导致 data-force-dark-detected 永不设置 → CSS 适配规则全部失效。
       *
       * 修正：
       *   1. UA 检测立即执行（不依赖 body）
       *   2. 滤镜检测用 document.documentElement 作为容器（<html> 始终存在）
       *   3. 同时监听 prefers-color-scheme 变化，覆盖 iOS Smart Invert /
       *      Chrome Android dark mode 等系统级反转
       */
      (function () {
        var html = document.documentElement;
        var ua = navigator.userAgent || '';

        /* UA 检测：夸克 / 华为 / UC / 百度 / QQ 浏览器 */
        var isQuark = /Quark/i.test(ua);
        var isHuawei = /HuaweiBrowser/i.test(ua) || /HarmonyOS/i.test(ua);
        var isUC = /UCBrowser/i.test(ua) || /UCWEB/i.test(ua);
        var isBaidu = /baiduboxapp/i.test(ua) || /Baidu/i.test(ua);
        var isQQBrowser = /MQQBrowser/i.test(ua) || /QQBrowser/i.test(ua);
        var isThirdParty = isQuark || isHuawei || isUC || isBaidu || isQQBrowser;
        if (isThirdParty) {
          html.setAttribute('data-thirdparty-browser', 'true');
        }

        /* 滤镜检测：用 <html> 作为容器（始终存在），不再依赖 <body> */
        function detectForcedDark() {
          try {
            var testEl = document.createElement('div');
            testEl.setAttribute('data-dark-test', 'true');
            testEl.style.cssText =
              'position:fixed;top:-9999px;left:-9999px;width:10px;height:10px;' +
              'background:#ffffff;color:#000000;pointer-events:none;z-index:-1;';
            html.appendChild(testEl);
            var bg = getComputedStyle(testEl).backgroundColor;
            var color = getComputedStyle(testEl).color;
            html.removeChild(testEl);
            /* 纯白背景被篡改（非 rgb(255,255,255)）→ 存在强制暗黑滤镜 */
            if (bg && bg !== 'rgb(255, 255, 255)' && bg !== '#ffffff') {
              html.setAttribute('data-force-dark-detected', 'true');
              return true;
            }
            /* 文字颜色被反转（黑色变成白色） */
            if (color && color !== 'rgb(0, 0, 0)' && color !== '#000000') {
              html.setAttribute('data-force-dark-detected', 'true');
              return true;
            }
            html.removeAttribute('data-force-dark-detected');
            return false;
          } catch (e) {
            return false;
          }
        }

        /* 立即检测一次 */
        detectForcedDark();

        /* DOM 就绪后再检测一次（部分浏览器在 body 解析后才注入滤镜） */
        function readyCheck() {
          detectForcedDark();
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', readyCheck);
        } else {
          readyCheck();
        }
        window.addEventListener('load', readyCheck);

        /* 监听系统暗色模式变化（iOS Smart Invert / Chrome Android 等） */
        try {
          if (window.matchMedia) {
            var mql = window.matchMedia('(prefers-color-scheme: light)');
            var onChange = function () {
              /* 系统是 light 但网站是 dark-only，浏览器可能反转 → 检测 */
              detectForcedDark();
            };
            if (mql.addEventListener) {
              mql.addEventListener('change', onChange);
            } else if (mql.addListener) {
              mql.addListener(onChange);
            }
          }
        } catch (e) {
          /* 旧浏览器不支持 matchMedia，忽略 */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
