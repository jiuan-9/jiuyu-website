name: CI

# 触发条件：
# - 推送到 refactor/v2（开发分支）
# - 针对 main / refactor/v2 的 Pull Request
on:
  push:
    branches: [refactor/v2]
  pull_request:
    branches: [main, refactor/v2]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Lint + Type Check（最快，先跑）
  # ──────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run check

  # ──────────────────────────────────────────────────────────────
  # Job 2: Unit Tests（Vitest + jsdom）
  # ──────────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build（绕过 prebuild 的 sync:downloads）
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (vite build, bypass prebuild)
        # 直接调 vite build，跳过 npm run build 的 prebuild hook
        # prebuild 调用 sync:downloads，依赖 GitHub Releases API
        # CI 环境无 Release 时会失败
        run: npx vite build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 4: E2E Tests（Playwright + chromium）
  # 依赖 build job 完成
  # ──────────────────────────────────────────────────────────────
  e2e-test:
    name: E2E Tests (chromium)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        # playwright.config.ts 的 webServer 已配置为
        # `npx vite build && npx vite preview --port 4173`
        # 自动绕过 prebuild
        run: npx playwright test --project=chromium

      - name: Upload test report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
