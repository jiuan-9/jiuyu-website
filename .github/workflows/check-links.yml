name: Check Download Links

# 在以下场景运行：
# - 每天凌晨 3 点定时巡检（捕捉远端 Release 被删除/改名的情况）
# - 推送到 main / refactor/v2 分支时
# - 手动触发
on:
  schedule:
    - cron: "0 19 * * *" # UTC 19:00 = 北京时间 03:00
  push:
    branches: [main, refactor/v2]
    paths:
      - "public/version.json"
      - "public/downloads.json"
      - "scripts/check-links.ts"
      - ".github/workflows/check-links.yml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync downloads (refresh before checking)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run sync:downloads

      - name: Check links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run check:links

      - name: Commit refreshed downloads.json (if changed)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/downloads.json public/version.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: 自动同步下载链接 [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `## ⚠️ 下载链接校验失败`,
              ``,
              `检测到失效的下载链接，请立即处理：`,
              ``,
              `**运行记录**：${runUrl}`,
              `**触发分支**：${context.ref}`,
              `**触发事件**：${context.eventName}`,
              ``,
              `### 修复步骤`,
              `1. 在 [Releases 页面](https://github.com/${context.repo.owner}/${context.repo.repo}/releases) 确认最新 Release 是否存在并已上传 .exe 资产`,
              `2. 如果 Release 已被误删，请重新创建并上传资产`,
              `3. 在本地运行 \`npm run sync:version\` 同步版本与链接`,
              `4. 推送修复后 CI 会自动重跑`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "下载链接校验失败 ⚠️",
              body,
              labels: ["bug", "ci-failed", "auto-generated"],
            });
